name: inspiration radar  daily scan

on:
  push:
    branches: [main]
  schedule:
    - cron: 0 1 * * *
  workflow_dispatch:

jobs:
  radar-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: run radar
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || deepseek-chat }}
          MAIL_HOST: ${{ secrets.MAIL_HOST || smtp.qq.com }}
          MAIL_PORT: ${{ secrets.MAIL_PORT || 465 }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: node index.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: inspiration-radar
          path: reports/
          retention-days: 7
