name: 灵感雷达 · 每日扫描

on:
  push:
    branches: [main]
    paths-ignore:
      - README.md
      - .gitignore
  schedule:
    - cron: 0 1 * * *
  workflow_dispatch:

jobs:
  radar-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install

      - name: 运行灵感雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || deepseek-chat }}
          MAIL_HOST: ${{ secrets.MAIL_HOST || smtp.qq.com }}
          MAIL_PORT: ${{ secrets.MAIL_PORT || 465 }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: node index.js

      - name: 上传简报产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspiration-radar
          path: reports/
          retention-days: 7
